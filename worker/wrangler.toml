name = "khdp-ai-gateway"
main = "src/index.ts"
compatibility_date = "2026-05-30"
compatibility_flags = ["nodejs_compat"]

# workers.dev subdomain is on by default for local testing
# (https://khdp-ai-gateway.<account>.workers.dev).
workers_dev = true

# Custom-domain bindings for production. Both routes go through the same
# Worker; the script discriminates by hostname / path. Uncomment after the
# khdp.ai zone is `active` in the Cloudflare dashboard (NS migration done).
#
# [[routes]]
# pattern = "khdp.ai"
# custom_domain = true
#
# [[routes]]
# pattern = "www.khdp.ai"
# custom_domain = true

[observability]
enabled = true

[vars]
# Public configuration (no secrets here). Override per-env via wrangler
# secrets if/when staging/prod diverge.
GITHUB_AGENTS_RAW = "https://raw.githubusercontent.com/KoreaHealthDataPlatform/khdp-api/main/AGENTS.md"
BACKEND_BASE = "https://khdp.net/_api/open"
