name = "khdp-ai-gateway"
main = "src/index.ts"
compatibility_date = "2026-05-30"
compatibility_flags = ["nodejs_compat"]
# Pinning the account ID lets wrangler skip the /memberships lookup,
# which the deploy API token doesn't have permission for.
account_id = "2250c9002ae689bc5c616b9fd0795e8f"

# workers.dev subdomain is on by default for local testing
# (https://khdp-ai-gateway.<account>.workers.dev).
workers_dev = true

# Temporary cutover (2026-06-03): khdp.ai NS reverted to Naver so that
# the SNUH www.snuh.ai CNAME chain works again. The Worker fronts the
# API gateway on khdp.io until the long-term api.khdp.net origin lands.
[[routes]]
pattern = "khdp.io"
custom_domain = true

[[routes]]
pattern = "www.khdp.io"
custom_domain = true

[observability]
enabled = true

[vars]
# Public configuration (no secrets here). Override per-env via wrangler
# secrets if/when staging/prod diverge.
GITHUB_AGENTS_RAW = "https://raw.githubusercontent.com/KoreaHealthDataPlatform/khdp-api/main/AGENTS.md"
# /v1/* is the canonical short-path surface; the Worker rewrites it
# onto the legacy nstri-back layout (/_api/open/*, /_api/oauth/*).
BACKEND_BASE = "https://khdp.net/_api"
# Web-root URLs the Worker 302-redirects to. /v1/oauth/authorize points
# here because the OAuth login page lives at the web root, not under /_api.
WEB_BASE = "https://khdp.net"
